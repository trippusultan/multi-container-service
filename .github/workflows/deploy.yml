name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: your-dockerhub-username/multi-container-todo-api

jobs:
  lint-and-test:
    name: 🔍 Lint & Unit Tests
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7.0
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_DATABASE: todos_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint src/ || true
        continue-on-error: true

  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: 🚀 Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH + docker-compose
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          envs: REGISTRY,IMAGE_NAME,GITHUB_SHA
          script: |
            set -euo pipefail

            cd /opt/todo-api || true

            # Pull latest repo changes
            git pull origin main || echo "No repo yet — will be handled by Ansible"

            # Clone repo if missing
            if [ ! -d "/opt/todo-api/.git" ]; then
              git clone https://github.com/${{ github.repository }}.git /opt/todo-api
              cd /opt/todo-api
            fi

            # Ensure Docker Compose is available
            if ! command -v docker compose &>/dev/null; then
              echo "docker compose plugin not found; installing..."
              DOCKER_COMPOSE_VERSION=2.29.0
              curl -fsSL "https://github.com/docker/compose/releases/download/v${DOCKER_COMPOSE_VERSION}/docker-compose-linux-x86_64" \
                -o /usr/local/bin/docker-compose
              chmod +x /usr/local/bin/docker-compose
            fi

            # Pull fresh image and restart
            IMAGE="${REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA}"
            docker compose pull todo-api || true
            docker compose up -d todo-api --remove-orphans

            # Restart app dependency chain if mongo is used
            docker compose up -d --remove-orphans

            echo "✅ Deployment complete"
            docker compose ps
