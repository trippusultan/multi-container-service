---
# ansible/playbook.yml
# Provision a bare droplets – installs Docker, Docker Compose, pulls images,
# and deploys the todo application via docker-compose.

- name: Provision Todo API server
  hosts: all
  become: true
  vars:
    compose_project_dir: /opt/todo-api
    github_repo: "REPLACE_WITH_YOUR_GITHUB_USERNAME/multi-container-todo-api"

  tasks:
    # ── System prerequisites ────────────────────────────────────────────
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install base packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - git
        state: present

    # ── Docker CE ──────────────────────────────────────────────────────
    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker apt repository
      apt_repository:
        repo: "deb [arch={{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }}] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Install Docker CE
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose
        state: present
        update_cache: yes

    - name: Ensure /usr/local/bin/docker-compose exists (v1 compat wrapper)
      file:
        src: /usr/lib/docker-compose/docker-compose
        dest: /usr/local/bin/docker-compose
        state: link
      when: ansible_facts.distribution == 'Ubuntu'

    # ── Docker daemon for overlay2 + graceful reboot handling ──────────
    - name: Enable and start Docker daemon
      systemd:
        name: docker
        state: started
        enabled: yes

    # ── Deploy application ──────────────────────────────────────────────
    - name: Create project directory
      file:
        path: "{{ compose_project_dir }}"
        state: directory
        mode: '0755'

    - name: Clone repo
      git:
        repo: "https://github.com/{{ github_repo }}.git"
        dest: "{{ compose_project_dir }}"
        force: yes
        version: main

    # - name: Pull API image  (uncomment if pushing to Docker Hub instead)
    #   shell: docker pull your-registry/todo-api:latest

    - name: Run docker-compose up
      community.docker.docker_compose_v2:
        project_src: "{{ compose_project_dir }}"
        state: present
        pull: always
        remove_orphans: yes

    - name: Print deployed URLs
      debug:
        msg:
          - "Application is running at http://{{ inventory_hostname }}"
          - "Reverse proxy (if enabled) at http://{{ inventory_hostname }}:80"
