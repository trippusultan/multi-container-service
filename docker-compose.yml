version: '3.8'

services:
  mongo:
    image: mongo:7.0
    container_name: todo-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    expose:
      - '27017'
    environment:
      MONGO_INITDB_DATABASE: todos
    command: ['mongod', '--bind_ip_all']
  api:
    build: .
    image: multi-container-todo-api:latest
    container_name: todo-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      - mongo
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/todos
      NODE_ENV: production
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:1.27-alpine
    container_name: todo-nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    profiles:
      - reverse-proxy
    networks:
      - default

volumes:
  mongo_data:

networks:
  default:
    driver: bridge
